get_installation_schedules:
  name: "Get Installation Schedules"
  description: "Gets the schedules for an Airzone Cloud installation."
  fields:
    config_entry:
      name: Config Entry
      description: The ID of the Airzone Cloud integration config entry.
      required: true
      selector:
        config_entry:
          integration: airzone_cloud

delete_installation_schedule:
  name: "Delete Installation Schedule"
  description: "Deletes a specific schedule from an Airzone Cloud installation."
  fields:
    config_entry:
      name: Config Entry
      description: The ID of the Airzone Cloud integration config entry.
      required: true
      selector:
        config_entry:
          integration: airzone_cloud
    schedule_id:
      name: Schedule ID
      description: The ID of the schedule to delete.
      required: true
      selector:
        text:


post_installation_schedule:
  name: "Create Installation Schedule"
  description: "Creates a new schedule for an Airzone Cloud installation."
  fields:
    config_entry:
      name: Config Entry
      description: The ID of the Airzone Cloud integration config entry.
      required: true
      selector:
        config_entry:
          integration: airzone_cloud
    schedule_data:
      name: Schedule Data
      description: The JSON object containing schedule parameters.
      required: true
      selector:
        object:

patch_installation_schedule:
  name: "Update Installation Schedule"
  description: "Updates an existing schedule for an Airzone Cloud installation."
  fields:
    config_entry:
      name: Config Entry
      description: The ID of the Airzone Cloud integration config entry.
      required: true
      selector:
        config_entry:
          integration: airzone_cloud
    schedule_id:
      name: Schedule ID
      description: The ID of the schedule to update.
      required: true
      selector:
        text:
    schedule_data:
      name: Schedule Data
      description: The JSON object containing schedule parameters.
      required: true
      selector:
        object:

toggle_schedule:
  name: "Toggle Schedule"
  description: "Enable or disable schedules by name and/or tag filters (season, away)."
  fields:
    config_entry:
      name: Config Entry
      description: The Airzone Cloud integration config entry.
      required: false
      selector:
        config_entry:
          integration: airzone_cloud
    schedule_name:
      name: Schedule Name(s)
      description: One or more schedule names to toggle. Can be combined with season/away filters.
      required: false
      example: "Winter Day"
      selector:
        object:
    season:
      name: Season
      description: Filter schedules by season tag (winter or summer).
      required: false
      selector:
        select:
          options:
            - "winter"
            - "summer"
    away:
      name: Away
      description: Filter by away tag. true = only away schedules, false = only non-away schedules.
      required: false
      selector:
        boolean:
    all:
      name: All
      description: Toggle all schedules. When true, ignores name/season/away filters.
      required: false
      selector:
        boolean:
    enabled:
      name: Enabled
      description: Whether the matching schedules should be enabled or disabled.
      required: true
      selector:
        boolean:

get_schedule_tags:
  name: "Get Schedule Tags"
  description: "Gets locally-stored tags (season, away) for all schedules."
  fields:
    config_entry:
      name: Config Entry
      description: The ID of the Airzone Cloud integration config entry.
      required: false
      selector:
        config_entry:
          integration: airzone_cloud

set_schedule_tags:
  name: "Set Schedule Tags"
  description: "Sets tags (season, away) for a specific schedule. Tags are stored locally."
  fields:
    config_entry:
      name: Config Entry
      description: The ID of the Airzone Cloud integration config entry.
      required: false
      selector:
        config_entry:
          integration: airzone_cloud
    schedule_id:
      name: Schedule ID
      description: The Airzone schedule ID to tag.
      required: true
      selector:
        text:
    season:
      name: Season
      description: "Season tag: winter, summer, or leave empty to clear."
      required: false
      selector:
        select:
          options:
            - "winter"
            - "summer"
    away:
      name: Away
      description: Whether this is an away/vacation schedule.
      required: false
      selector:
        boolean:

patch_installation_schedules_activate:
  name: "Activate/Deactivate Schedules"
  description: "Globally activates or deactivates schedules for an Airzone Cloud installation."
  fields:
    config_entry:
      name: Config Entry
      description: The ID of the Airzone Cloud integration config entry.
      required: true
      selector:
        config_entry:
          integration: airzone_cloud
    active:
      name: Active
      description: Whether the schedules should be globally active.
      required: true
      selector:
        boolean:
